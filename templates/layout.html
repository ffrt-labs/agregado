<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregado</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-json-enc@2.0.1/json-enc.js"></script>
    <style>
      :root{
        --paper:#efe8da; --sidebar:#e8e0ce; --card:#faf6ec; --ink:#26211a;
        --soft:#7a7060; --faint:#a99e8b; --line:#e3d9c6; --line-strong:#ddd3c0;
        --accent:#a8593a; --accent-soft:#f1e3d6; --ok:#6f8f5f; --warn:#c98a3a; --danger:#b5604a;
      }
      *{box-sizing:border-box}
      html,body{margin:0}
      body{background:var(--paper); color:var(--ink); font-family:'JetBrains Mono',ui-monospace,monospace; font-size:13px; -webkit-font-smoothing:antialiased}
      a{color:inherit}
      ::selection{background:var(--accent); color:var(--card)}
      ::-webkit-scrollbar{width:11px;height:11px}
      ::-webkit-scrollbar-thumb{background:#d3c8b2;border:3px solid var(--paper);border-radius:8px}
      ::-webkit-scrollbar-track{background:transparent}

      .app{display:flex; min-height:100vh}
      .sidebar{width:236px; flex:none; background:var(--sidebar); border-right:1px solid #dccfb6; padding:30px 22px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh}
      .brand{display:flex; align-items:center; gap:11px; margin-bottom:40px; text-decoration:none}
      .brand-mark{width:22px; height:22px; background:var(--accent); transform:rotate(45deg); flex:none}
      .brand-name{font-family:'Newsreader',serif; font-size:23px; font-weight:600; letter-spacing:-.01em; color:var(--ink)}
      .nav{display:flex; flex-direction:column; gap:3px}
      .nav a{display:flex; align-items:center; gap:11px; padding:9px 12px; border-radius:7px; font-size:12.5px; letter-spacing:.01em; color:var(--soft); text-decoration:none; transition:all .18s}
      .nav a:hover{color:var(--ink)}
      .nav a .dot{width:5px; height:5px; border-radius:50%; background:transparent; flex:none}
      .nav a.active{background:var(--card); color:var(--ink); font-weight:500; box-shadow:0 1px 2px rgba(80,60,30,.06)}
      .nav a.active .dot{background:var(--accent)}
      .side-status{margin-top:auto; display:flex; align-items:center; gap:8px; font-size:10.5px; color:var(--faint)}
      .side-status .live{width:6px; height:6px; border-radius:50%; background:var(--ok); box-shadow:0 0 0 3px rgba(111,143,95,.18); flex:none}

      .main{flex:1; min-width:0}
      .page{max-width:880px; margin:0 auto; padding:56px 60px 100px}
      .eyebrow{font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); margin-bottom:12px}
      .page-title{font-family:'Newsreader',serif; font-weight:500; font-size:42px; letter-spacing:-.02em; margin:0 0 8px; line-height:1}
      .page-sub{margin:0; color:var(--soft); font-size:12.5px}

      .toolbar{display:flex; gap:14px; align-items:center; margin:32px 0 4px; flex-wrap:wrap}
      .search{flex:1; min-width:220px; padding:11px 14px; background:var(--card); border:1px solid var(--line-strong); border-radius:7px; font:inherit; font-size:12.5px; color:var(--ink)}
      .search:focus{outline:none; border-color:var(--accent)}
      .filter-form{margin:0}
      .select{padding:11px 14px; background:var(--card); border:1px solid var(--line-strong); border-radius:7px; font:inherit; font-size:12px; color:var(--ink); cursor:pointer}
      .select:focus{outline:none; border-color:var(--accent)}

      .feed{list-style:none; margin:18px 0 0; padding:0; border-top:1px solid var(--line)}
      .item{display:flex; gap:22px; padding:22px 4px; border-bottom:1px solid var(--line); cursor:pointer; transition:opacity .25s}
      .item.is-read{opacity:.5}
      .item-body{flex:1; min-width:0}
      .item-meta{display:flex; align-items:center; gap:9px; margin-bottom:7px; font-size:10.5px; letter-spacing:.04em; color:var(--faint)}
      .item-meta .src{color:var(--accent); font-weight:500}
      .read-tag{color:#bdb29d; font-size:9.5px; letter-spacing:.08em}
      .item-title{display:block; font-family:'Newsreader',serif; font-size:21px; line-height:1.28; font-weight:500; letter-spacing:-.01em; color:var(--ink); text-decoration:none}
      .item-title:hover{color:var(--accent)}
      .item-excerpt{margin:7px 0 0; font-size:12px; color:#8a8070; line-height:1.55; max-width:60ch}
      .item-side{flex:none; display:flex; flex-direction:column; align-items:flex-end; gap:10px; padding-top:2px}
      .readtime{font-size:10px; letter-spacing:.06em; color:var(--faint); white-space:nowrap}

      .empty{text-align:center; padding:80px 20px; color:var(--faint)}
      .empty h2{font-family:'Newsreader',serif; font-weight:500; font-size:24px; color:#bdb29d; margin:0 0 8px}
      .empty p{font-size:12px; margin:0}

      .pagination{display:flex; gap:12px; margin-top:30px}
      .pagination a{font-size:11px; letter-spacing:.04em; color:var(--soft); text-decoration:none; padding:8px 14px; border:1px solid var(--line); border-radius:6px}
      .pagination a:hover{border-color:var(--accent); color:var(--accent)}

      .pill{padding:1px 6px; border-radius:4px; font-size:9.5px; letter-spacing:.08em; color:var(--soft); background:#efe2cf; text-transform:uppercase}
      .pill.email{background:#e6e8df}

      .src-form{display:flex; gap:10px; align-items:flex-end; margin:32px 0 30px; padding:18px; background:var(--card); border:1px solid var(--line-strong); border-radius:9px; flex-wrap:wrap}
      .field{display:flex; flex-direction:column; gap:6px}
      .field.grow{flex:1; min-width:130px}
      .field.grow2{flex:2; min-width:180px}
      .field-label{font-size:9.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint)}
      .field input, .field select{padding:9px 11px; background:#fffdf8; border:1px solid var(--line-strong); border-radius:6px; font:inherit; font-size:12px; color:var(--ink)}
      .field input:focus, .field select:focus{outline:none; border-color:var(--accent)}
      .btn-primary{padding:10px 20px; background:var(--accent); color:var(--card); border:none; border-radius:6px; font:inherit; font-size:11.5px; letter-spacing:.04em; font-weight:500; cursor:pointer}

      .src-table{border:1px solid var(--line); border-radius:9px; overflow:hidden; background:var(--card)}
      .src-head, .src-row{display:flex; align-items:center; padding:13px 18px}
      .src-head{font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); background:#f3ecdd; border-bottom:1px solid var(--line)}
      .src-row{border-top:1px solid #ece3d2}
      .src-row:first-child{border-top:none}
      .src-row:hover{background:#f6f0e4}
      .col-name{flex:1; min-width:0; padding-right:14px}
      .col-fetch{width:150px; flex:none}
      .src-row .col-fetch{font-size:11px; color:var(--soft)}
      .col-health{width:120px; flex:none}
      .col-ops{width:78px; flex:none; display:flex; gap:5px; justify-content:flex-end}
      .src-name{display:flex; align-items:center; gap:9px}
      .src-name b{font-family:'Newsreader',serif; font-size:16px; font-weight:500}
      .src-url{font-size:10.5px; color:var(--faint); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
      .health{display:flex; align-items:center; gap:7px; font-size:10.5px; color:var(--soft)}
      .health .hdot{width:7px; height:7px; border-radius:50%; background:var(--ok); flex:none}
      .health.err{color:var(--warn)}
      .health.err .hdot{background:var(--warn)}
      .icon-btn{width:28px; height:28px; border:1px solid var(--line); border-radius:6px; background:none; color:var(--soft); font-size:13px; cursor:pointer; transition:all .15s}
      .icon-btn:hover{border-color:var(--accent); color:var(--accent)}
      .icon-btn.danger:hover{border-color:var(--danger); color:var(--danger)}
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <a class="brand" href="/articles">
                <span class="brand-mark"></span>
                <span class="brand-name">Agregado</span>
            </a>
            <nav class="nav">
                <a href="/articles"><span class="dot"></span>Articles</a>
                <a href="/sources"><span class="dot"></span>Sources</a>
            </nav>
            <div class="side-status">
                <span class="live"></span>
                self-hosted
            </div>
        </aside>
        <main class="main">
            {{ template "content" . }}
        </main>
    </div>
    <script>
      // Highlight the current nav item (no backend change needed).
      document.querySelectorAll('.nav a').forEach(function(a){
        if (a.getAttribute('href') === location.pathname) a.classList.add('active');
      });
    </script>
</body>
</html>
