{{ define "content" }}
    <h1>Articles</h1>
    <form
        method="GET"
        action="/articles"

    >
        <select
            name="source_id"
            onchange="this.form.submit()"
        >
            <option value="">
                All sources
            </option>
            {{ range .Sources }}
            <option value="{{ .ID }}" {{ if eq $.SelectedSource .ID }}selected{{ end }}>
                {{ .Name }}
            </option>
            {{ end }}
        </select>
    </form>
    <div>
        <label for="search">Search</label>
        <input
            hx-get="/articles/search"
            hx-trigger="keyup changed delay:300ms"
            hx-target="#article-list"
            hx-swap="outerHTML"
            name="q"
            id="search"
        >
    </div>
    {{ if .Articles }}
        <ul id="article-list">
            {{ range .Articles }}
            <li
                hx-post="/api/articles/{{ .ID }}/read"
                hx-swap="none"
            >
                <a
                    href="{{ .ExternalURL }}"
                    target="_blank"
                >
                    {{ .Title }} - {{ .PublishedAt }}
                </a>
            </li>
            {{ end }}
        </ul>
    {{ else }}
        <p>No articles found</p>
    {{ end }}
    <div>
        {{ if .HasPrev }}
            <a href="/articles?source_id={{ .SelectedSource }}&offset={{ .PrevOffset }}">Previous</a>
        {{ end }}
        {{ if .HasMore }}
            <a href="/articles?source_id={{ .SelectedSource }}&offset={{ .NextOffset }}">Next</a>
        {{ end }}
    </div>
{{ end }}
