services:
  db:
    image: postgres:16-alpine
    container_name: agregado-db
    restart: always
    shm_size: 128mb
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: always
    ports:
      - 8888:8080

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASS}

  mailpit:
    image: axllent/mailpit
    restart: always
    ports:
      - "1025:1025"
      - "8025:8025"

  agregado:
    profiles: ["prod"]
    build:
      context: .
      network: host
    image: agregado
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_started
    environment:
      DATABASE_HOST: db
      DATABASE_USER: ${DATABASE_USER}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_DB: ${DATABASE_DB}

      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      RABBITMQ_HOST: rabbitmq

      HTTP_PORT: ${HTTP_PORT}

      RSS_POLL_INTERVAL: ${RSS_POLL_INTERVAL}

      WEBHOOK_SECRET: ${WEBHOOK_SECRET}

      DIGEST_RECIPIENT_EMAIL: ${DIGEST_RECIPIENT_EMAIL}
      DIGEST_SCHEDULE: ${DIGEST_SCHEDULE}
      DIGEST_MAX_ARTICLES: ${DIGEST_MAX_ARTICLES}
      DIGEST_LOOKBACK_HOURS: ${DIGEST_LOOKBACK_HOURS}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_FROM_MAIL: ${SMTP_FROM_MAIL}

      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      AI_MODEL: ${AI_MODEL}
    ports:
      - 8080:8080

    restart: unless-stopped
volumes:
  postgres_data:
