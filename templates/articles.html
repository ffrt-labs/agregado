{{ define "content" }}
<h1>Articles</h1>
<ul>
    {{ range .Articles }}
    <li
        hx-post="/api/articles/{{ .ID }}/read"
        hx-swap="none"
    >
        <a
            href="{{ .ExternalURL }}"
            target="_blank"
        >
            {{ .Title }} - {{ .PublishedAt }}
        </a>
    </li>
    {{ end }}
</ul>
{{ end }}
